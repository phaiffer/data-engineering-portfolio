services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.5
    container_name: event-stream-redpanda
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082
      - --set
      - redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --api-urls localhost:9644 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  redpanda-data:
